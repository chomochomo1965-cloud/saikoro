<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎲 今日の運勢 🎲</title>
<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: #87CEFA; /* 背景ブルーに統一 */
}
h1{
  font-size:32px;
  margin-top:30px;
}
.scene{
  display:flex;
  justify-content:center;
  gap:60px;
  margin:50px;
  perspective:800px;
}
.dice{
  width:120px;
  height:120px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s;
}
.face{
  position:absolute;
  width:120px;
  height:120px;
  background:white;
  border:3px solid #333;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
}
.dot{
  width:24px;
  height:24px;
  background:black;
  border-radius:50%;
  margin:auto;
}
.red{
  background:red;
}
.front  { transform:rotateY(0deg) translateZ(60px); }
.back   { transform:rotateY(180deg) translateZ(60px) rotateY(180deg); }
.right  { transform:rotateY(90deg) translateZ(60px); }
.left   { transform:rotateY(-90deg) translateZ(60px); }
.top    { transform:rotateX(-90deg) translateZ(60px); }
.bottom { transform:rotateX(90deg) translateZ(60px) rotateY(180deg); }

button{
  font-size:24px;
  padding:15px 40px;
  cursor:pointer;
}
#result{
  font-size:26px;
  margin-top:20px;
  font-weight:bold;
  white-space: pre-line;
}
</style>
</head>
<body>

<h1>🎲 今日の運勢 🎲</h1>

<div class="scene">
  <div class="dice" id="dice1">
    <!-- 1の目 -->
    <div class="face front">
      <div></div><div></div><div></div>
      <div></div><div class="dot red"></div><div></div>
      <div></div><div></div><div></div>
    </div>
    <!-- 6の目 -->
    <div class="face back">
      <div class="dot"></div><div></div><div class="dot"></div>
      <div class="dot"></div><div></div><div class="dot"></div>
      <div class="dot"></div><div></div><div class="dot"></div>
    </div>
    <!-- 3の目 -->
    <div class="face right">
      <div></div><div></div><div class="dot"></div>
      <div></div><div class="dot red"></div><div></div>
      <div class="dot"></div><div></div><div></div>
    </div>
    <!-- 4の目 -->
    <div class="face left">
      <div class="dot"></div><div></div><div class="dot"></div>
      <div></div><div></div><div></div>
      <div class="dot"></div><div></div><div class="dot"></div>
    </div>
    <!-- 5の目 -->
    <div class="face top">
      <div class="dot"></div><div></div><div class="dot"></div>
      <div></div><div class="dot red"></div><div></div>
      <div class="dot"></div><div></div><div class="dot"></div>
    </div>
    <!-- 2の目 -->
    <div class="face bottom">
      <div></div><div></div><div class="dot"></div>
      <div></div><div></div><div></div>
      <div class="dot"></div><div></div><div></div>
    </div>
  </div>
  <div class="dice" id="dice2"></div>
</div>

<button onclick="roll()">サイコロをふる</button>
<div id="result"></div>

<script>
// サイコロ2は1と同じHTML
document.getElementById("dice2").innerHTML = document.getElementById("dice1").innerHTML;

// ゆうちゃん向け運勢
const fortune = {
  2: "😐😐😐😐😐　\nゆうちゃん、最低の運勢だよ…気をつけてね",
  3: "🙂🙂🙂😐😐　\nゆうちゃん、少し注意の日だよ",
  4: "🙂🙂🙂🙂😐　\nゆうちゃん、小さな幸運ありだよ",
  5: "😄😄😄😐😐　\nゆうちゃん、平凡な一日だよ",
  6: "😄😄😄😄😐　\nゆうちゃん、ちょっと良いことあるかも",
  7: "😃😃😃😃😃　\nゆうちゃん、幸運の兆しありだよ",
  8: "😃😃😃😃😃　\nゆうちゃん、いい日になりそう",
  9: "🤩🤩🤩🤩🤩　\nゆうちゃん、素晴らしい一日だよ",
  10:"🤩🤩🤩🤩🤩　\nゆうちゃん、とても良い運勢だよ",
  11:"🤩🤩🤩🤩🤩🤩\nゆうちゃん、最高に幸運だよ！",
  12:"🤩🤩🤩🤩🤩🤩\nゆうちゃん、ミラクル級の運勢だよ！"
};

function roll(){
  document.getElementById("result").textContent = "";

  let d1 = Math.floor(Math.random()*6)+1;
  let d2 = Math.floor(Math.random()*6)+1;

  const map = {
    1:"rotateX(0deg) rotateY(0deg)",
    2:"rotateX(90deg) rotateY(0deg)",
    3:"rotateX(0deg) rotateY(-90deg)",
    4:"rotateX(0deg) rotateY(90deg)",
    5:"rotateX(-90deg) rotateY(0deg)",
    6:"rotateX(180deg) rotateY(0deg)"
  };

  let dice1 = document.getElementById("dice1");
  let dice2 = document.getElementById("dice2");

  let baseTime = 800;
  let dice2Time = baseTime * 1.5;

  dice1.style.transition = "transform " + (baseTime/1000) + "s";
  dice2.style.transition = "transform " + (dice2Time/1000) + "s";
  dice1.style.transform = "rotateX("+(540+Math.random()*540)+"deg) rotateY("+(540+Math.random()*540)+"deg)";
  dice2.style.transform = "rotateX("+(540+Math.random()*540)+"deg) rotateY("+(540+Math.random()*540)+"deg)";

  setTimeout(function(){
    dice1.style.transition = "transform 0.5s";
    dice1.style.transform = map[d1];
  }, baseTime);

  setTimeout(function(){
    dice2.style.transition = "transform 0.5s";
    dice2.style.transform = map[d2];

    setTimeout(function(){
      let display1 = (d1===2)?5:(d1===5)?2:d1;
      let display2 = (d2===2)?5:(d2===5)?2:d2;
      let total = display1 + display2;

      document.getElementById("result").textContent =
        "結果：" + display1 + " + " + display2 + " = " + total +
        "\n" + fortune[total];

    }, 1000);
  }, dice2Time);
}
</script>

</body>
</html>
